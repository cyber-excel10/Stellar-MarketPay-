# Nginx configuration for Stellar MarketPay with HTTP/2 Server Push
# This configuration optimizes delivery of Next.js static assets

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 2048;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    client_max_body_size 20M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    gzip_disable "msie6";

    # Brotli compression (if available)
    # brotli on;
    # brotli_comp_level 6;
    # brotli_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript image/svg+xml;

    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=auth_limit:10m rate=5r/s;
    limit_req_zone $binary_remote_addr zone=escrow_limit:10m rate=2r/s;

    # Upstream Next.js server
    upstream nextjs {
        server localhost:3000;
        keepalive 64;
    }

    # Upstream Backend API server
    upstream backend {
        server localhost:4000;
        keepalive 64;
    }

    # HTTP/2 Server Push configuration
    server {
        listen 443 ssl http2;
        listen [::]:443 ssl http2;
        server_name stellar-marketpay.com www.stellar-marketpay.com;

        # SSL certificates
        ssl_certificate /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_trusted_certificate /etc/nginx/ssl/chain.pem;

        # SSL configuration
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers 'ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384';
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 10m;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Security headers
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;

        # HTTP/2 Server Push for critical assets
        http2_push_preload on;

        location / {
            proxy_pass http://nextjs;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            
            # HTTP/2 Server Push for critical Next.js assets
            http2_push /_next/static/css/app/layout.css;
            http2_push /_next/static/chunks/webpack.js;
            http2_push /_next/static/chunks/framework.js;
            http2_push /_next/static/chunks/main.js;
        }

        # API proxy with rate limiting
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Auth endpoint with stricter rate limiting
        location /api/auth/ {
            limit_req zone=auth_limit burst=5 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Escrow endpoint with strictest rate limiting
        location /api/escrow/ {
            limit_req zone=escrow_limit burst=3 nodelay;
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Static files with caching
        location /_next/static/ {
            alias /var/www/stellar-marketpay/.next/static/;
            expires 365d;
            add_header Cache-Control "public, immutable";
            
            # HTTP/2 Server Push for critical CSS
            location ~* \.css$ {
                http2_push on;
                expires 365d;
                add_header Cache-Control "public, immutable";
            }
            
            # HTTP/2 Server Push for critical JS chunks
            location ~* (webpack|framework|main)\.js$ {
                http2_push on;
                expires 365d;
                add_header Cache-Control "public, immutable";
            }
        }

        # Static assets
        location /static/ {
            alias /var/www/stellar-marketpay/public/static/;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }

        # Images
        location /images/ {
            alias /var/www/stellar-marketpay/public/images/;
            expires 30d;
            add_header Cache-Control "public, max-age=2592000";
        }

        # Favicon
        location = /favicon.ico {
            alias /var/www/stellar-marketpay/public/favicon.ico;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }

        # Robots.txt
        location = /robots.txt {
            alias /var/www/stellar-marketpay/public/robots.txt;
            expires 1d;
            add_header Cache-Control "public, max-age=86400";
        }

        # Manifest.json
        location = /manifest.json {
            alias /var/www/stellar-marketpay/public/manifest.json;
            expires 7d;
            add_header Cache-Control "public, max-age=604800";
        }
    }

    # HTTP to HTTPS redirect
    server {
        listen 80;
        listen [::]:80;
        server_name stellar-marketpay.com www.stellar-marketpay.com;
        
        return 301 https://$server_name$request_uri;
    }
}
